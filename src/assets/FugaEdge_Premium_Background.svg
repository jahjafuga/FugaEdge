<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3840 2160" width="3840" height="2160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1020"/>
      <stop offset="55%" stop-color="#081326"/>
      <stop offset="100%" stop-color="#040814"/>
    </linearGradient>

    <radialGradient id="goldGlowTL" cx="0%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD34D" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#D4AF37" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="goldGlowBR" cx="100%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#C58B1A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C58B1A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#F4C542"/>
      <stop offset="100%" stop-color="#B77A12"/>
    </linearGradient>

    <filter id="blurLarge">
      <feGaussianBlur stdDeviation="120"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <circle cx="300" cy="700" r="1100" fill="url(#goldGlowTL)" filter="url(#blurLarge)"/>
  <circle cx="3500" cy="2050" r="700" fill="url(#goldGlowBR)" filter="url(#blurLarge)"/>

  <path d="M -200 1600 C 500 400, 1700 900, 2800 250 C 3300 0, 3700 -200, 4200 -300"
        fill="none"
        stroke="url(#goldLine)"
        stroke-width="6"
        filter="url(#glow)"
        opacity="0.95"/>

  <path d="M 2500 2400 C 3300 2000, 3700 1300, 3900 500"
        fill="none"
        stroke="url(#goldLine)"
        stroke-width="3"
        opacity="0.35"/>

  <path d="M 2700 2500 C 3500 2100, 3900 1450, 4050 650"
        fill="none"
        stroke="url(#goldLine)"
        stroke-width="2"
        opacity="0.18"/>
</svg>
